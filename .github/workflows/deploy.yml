# Builds your .cook files into a static website with CookCLI and deploys it to
# GitHub Pages. Runs automatically on every push to main — including pushes that
# come from Obsidian's auto-sync — so the public site always reflects the latest
# recipes without anyone running a build locally.

name: Build and deploy recipe site

on:
  push:
    branches: [main]
  workflow_dispatch:        # also lets you trigger a rebuild manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Install CookCLI
        # Discovers the Linux x86_64 asset from the latest CookCLI release
        # dynamically, so this keeps working even if Cooklang renames release
        # assets in the future.  Fails loudly with diagnostics if no match.
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/cooklang/cookcli/releases/latest"

          ASSET_URL=$(curl -fsSL "$API" \
            | grep -oE '"browser_download_url":\s*"[^"]+linux[^"]+\.tar\.gz"' \
            | grep -iE 'x86_64|amd64' \
            | head -1 \
            | sed -E 's/.*"(https[^"]+)".*/\1/')

          if [ -z "${ASSET_URL:-}" ]; then
            echo "ERROR: Could not find a Linux x86_64 CookCLI release asset."
            echo "Available assets in the latest release:"
            curl -fsSL "$API" | grep browser_download_url || true
            exit 1
          fi

          echo "Downloading CookCLI from: $ASSET_URL"
          curl -fL "$ASSET_URL" -o cook.tar.gz
          tar -xzf cook.tar.gz
          sudo install -m 0755 cook /usr/local/bin/cook
          cook --version

      - name: Build the static site
        # --base-url sets the subpath so CSS/links resolve correctly on a project
        # Pages site served from https://<user>.github.io/<repo>/ .  The variable
        # below fills in your repo name automatically (e.g. "recipes").
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          cook build web _site --base-url "/${REPO_NAME}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
